# ═══════════════════════════════════════════════════════════════════════════
# Nginx — Custom Domain Support para embed/player
# ═══════════════════════════════════════════════════════════════════════════
#
# Este archivo permite que usuarios conecten dominios personalizados (ej: videos.miempresa.com)
# que apunten al embed/player de su workspace.
#
# INSTALACIÓN:
#   1. El usuario crea un CNAME apuntando a tu dominio principal
#      Ejemplo: videos.miempresa.com → CNAME → streamvault.com
#
#   2. Copiar este archivo: sudo cp nginx-custom-domain.conf /etc/nginx/sites-available/
#
#   3. Crear enlace simbólico: sudo ln -s /etc/nginx/sites-available/nginx-custom-domain.conf /etc/nginx/sites-enabled/
#
#   4. Generar certificado SSL para el custom domain:
#      sudo certbot --nginx -d videos.miempresa.com
#
#   5. Recargar nginx: sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANTE: Este bloque debe estar ANTES del bloque principal (nginx.conf)
# para que capture primero los custom domains
# ═══════════════════════════════════════════════════════════════════════════

# ─── HTTP → HTTPS redirect para custom domains ────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<custom_domain>.+)$;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS para custom domains ─────────────────────────────────────────────
# Este bloque captura CUALQUIER dominio que tenga certificado SSL válido
# y lo rutea al backend, donde server.js valida si es un custom domain registrado
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    # Captura CUALQUIER dominio que llegue a este servidor
    server_name ~^(?<custom_domain>.+)$;

    # Certificados SSL (certbot los genera automáticamente para cada custom domain)
    # Nota: certbot actualiza estas líneas cuando generas un certificado nuevo
    ssl_certificate     /etc/letsencrypt/live/$custom_domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$custom_domain/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Headers de seguridad ──────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # ─── Límites y timeouts ────────────────────────────────────────────────
    client_max_body_size 100m;  # Embeds no suben archivos, pero por si acaso
    
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ─── Headers al backend ────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection        "";
    proxy_set_header Host              $host;              # Dominio custom
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Custom-Domain   $host;             # Flag explícito

    # ─── Compresión ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        application/x-mpegURL text/xml application/xml image/svg+xml;

    # ─── HLS streaming (para player embeds) ───────────────────────────────
    location /videos/ {
        proxy_pass        http://streamvault_api;
        proxy_buffering   off;
        proxy_cache       off;
        expires           1m;
        add_header Cache-Control "public, max-age=60";
    }

    # ─── Embed y Player endpoints ──────────────────────────────────────────
    location ~ ^/(embed|player|watch|api/videos/|api/playlists/) {
        # Rate limit moderado para embeds públicos
        limit_req zone=general burst=50 nodelay;
        limit_req_status 429;
        
        proxy_pass http://streamvault_api;
        
        # Headers adicionales para CORS (embeds pueden estar en iframes)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # ─── Bloquear acceso a rutas administrativas ──────────────────────────
    # Custom domains SOLO deben servir embeds/player, nunca dashboard/admin
    location ~ ^/(dashboard|admin|auth|api/admin|api/upload|api/billing) {
        return 403;
    }

    # ─── Root y otras rutas ────────────────────────────────────────────────
    location / {
        proxy_pass http://streamvault_api;
    }
}

# ═══════════════════════════════════════════════════════════════════════════
# NOTAS DE IMPLEMENTACIÓN:
# ═══════════════════════════════════════════════════════════════════════════
#
# 1. BACKEND VALIDATION (server.js):
#    El backend debe validar en cada request si el Host header es un custom domain
#    registrado en la tabla workspaces.custom_domain, y restringir acceso solo
#    a embeds/player de ese workspace.
#
# 2. CERTIFICADOS SSL:
#    Cada custom domain necesita su propio certificado. Usar certbot:
#    sudo certbot --nginx -d videos.cliente.com
#
# 3. UPSTREAM:
#    Este archivo asume que existe un upstream llamado "streamvault_api"
#    definido en nginx.conf principal. Si no existe, agregarlo arriba:
#    
#    upstream streamvault_api {
#        least_conn;
#        server 127.0.0.1:3000;
#        keepalive 64;
#    }
#
# 4. ORDEN DE ARCHIVOS:
#    Nginx procesa los archivos en /etc/nginx/sites-enabled/ en orden alfabético.
#    Este archivo debe procesarse ANTES que el archivo principal para capturar
#    custom domains primero. Si es necesario, renombrar a "00-custom-domains.conf"
#
# 5. WILDCARD SSL (opcional):
#    Para evitar generar un certificado por cada custom domain, podrías usar
#    un wildcard certificate (*.tudominio.com), pero entonces los clientes
#    verían "*.tudominio.com" en lugar de su propio dominio.
#
# 6. RATE LIMITING:
#    Los custom domains comparten las mismas zonas de rate limit que el dominio
#    principal. Si necesitas límites diferentes por custom domain, crear zonas
#    adicionales con map $host.
#
# ═══════════════════════════════════════════════════════════════════════════
