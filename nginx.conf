# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Load Balancer + Reverse Proxy
#
# INSTALACIÓN (Ubuntu/Debian):
#   sudo cp nginx.conf /etc/nginx/sites-available/streamvault
#   sudo ln -s /etc/nginx/sites-available/streamvault /etc/nginx/sites-enabled/
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d tu-dominio.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# ESCALAR:
#   Fase 1 — 1 servidor:  upstream tiene 1 entrada (127.0.0.1:3000)
#   Fase 2 — 2+ servidores: agregar IPs privadas en el bloque upstream
#   Fase 3 — AWS: reemplazar este nginx por un ALB y eliminar este archivo
# ─────────────────────────────────────────────────────────────────────────────

# ─── Pool de servidores API ───────────────────────────────────────────────────
# least_conn: manda cada request al backend con menos conexiones activas.
# Mejor que round-robin para uploads largos (evita saturar un servidor).
upstream streamvault_api {
    least_conn;

    # ── Fase 1: servidor único ───────────────────────────────────────────────
    server 127.0.0.1:3000;

    # ── Fase 2: agregar aquí las IPs privadas de los servidores API ──────────
    # server 10.0.0.2:3000 weight=1;
    # server 10.0.0.3:3000 weight=1;

    # keepalive: mantiene conexiones TCP abiertas al backend (evita handshake en cada request)
    keepalive 64;
}

# ─── Zonas de rate limiting ───────────────────────────────────────────────────
# 10 MB de memoria ≈ 160 000 IPs rastreadas simultáneamente
limit_req_zone $binary_remote_addr zone=general:10m  rate=120r/m;
limit_req_zone $binary_remote_addr zone=upload:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth:10m     rate=20r/m;

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tu-dominio.com www.tu-dominio.com;

    # Let's Encrypt ACME challenge (certbot lo necesita para renovar el certificado)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tu-dominio.com www.tu-dominio.com;

    # Certificados SSL (generados por certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ─── Headers de seguridad ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # ─── Tamaño máximo de upload: 10 GB ─────────────────────────────────────
    client_max_body_size 10g;

    # ─── Timeouts ────────────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    3600s;   # 1 h — para uploads grandes
    proxy_read_timeout    3600s;   # 1 h — para SSE y uploads

    # ─── Headers al backend ──────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection        "";   # vacío = keepalive upstream
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ─── Compresión ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        application/x-mpegURL text/xml application/xml image/svg+xml;

    # ─── Uploads ─────────────────────────────────────────────────────────────
    # Rate limit estricto: 10 uploads/min por IP
    location = /api/upload {
        limit_req zone=upload burst=3 nodelay;
        limit_req_status 429;

        proxy_pass            http://streamvault_api;
        proxy_request_buffering off;   # no acumular el body — pasar directo al backend
        proxy_read_timeout    3600s;
    }

    # ─── Auth endpoints ───────────────────────────────────────────────────────
    location ~ ^/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://streamvault_api;
    }

    # ─── SSE — Server-Sent Events (admin dashboard en tiempo real) ───────────
    # Sin buffering y sin timeout corto para mantener la conexión abierta
    location /api/admin/stream {
        proxy_pass            http://streamvault_api;
        proxy_set_header      Connection '';
        proxy_http_version    1.1;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    24h;
        chunked_transfer_encoding on;
        # SSE no va por rate limit — es 1 conexión persistente, no requests repetidos
    }

    # ─── Payment provider webhooks (Stripe, PayPal, Binance) ─────────────────
    # Sin rate limit — estos endpoints los llaman servidores externos, no usuarios.
    # El prefix match cubre /webhooks/stripe, /webhooks/paypal, /webhooks/binance.
    location ^~ /api/billing/webhooks {
        proxy_pass http://streamvault_api;
    }

    # ─── HLS — segmentos de video ─────────────────────────────────────────────
    # Si usas CloudFront como CDN los clientes nunca llegan aquí.
    # Esta ruta es el fallback cuando CDN no está configurado.
    location /videos/ {
        proxy_pass        http://streamvault_api;
        proxy_buffering   off;   # streaming: no acumular segmentos en nginx
        proxy_cache       off;
        expires           1m;
        add_header Cache-Control "public, max-age=60";
    }

    # ─── Archivos estáticos (JS/CSS/HTML del dashboard) ─────────────────────
    # Nginx puede servir estos directamente sin tocar Node.js.
    # Descomenta si copias /public a /var/www/streamvault/public en el servidor.
    # location /js/ {
    #     root /var/www/streamvault/public;
    #     expires 7d;
    #     add_header Cache-Control "public, max-age=604800, immutable";
    # }

    # ─── Todo lo demás ────────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://streamvault_api;
    }
}
