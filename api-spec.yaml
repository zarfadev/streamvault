openapi: 3.0.3
info:
  title: StreamVault API
  description: |
    Professional video hosting platform API. Authenticate with a JWT Bearer token or API key (`sv_live_xxx`).
    
    All timestamps are **UNIX epoch integers** (seconds).
  version: 1.0.0
  contact:
    name: StreamVault Support
    url: https://streamvault.link

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.streamvault.link
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    workspaceId:
      in: header
      name: X-Workspace-Id
      required: true
      schema:
        type: string
  schemas:
    Video:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        status:
          type: string
          enum: [processing, transcoding, queued, ready, error, scheduled]
        qualities: { type: array, items: { type: string } }
        duration: { type: number }
        size: { type: integer }
        views: { type: integer }
        visibility:
          type: string
          enum: [public, private, password]
        m3u8Url: { type: string }
        thumbnailUrl: { type: string }
        workspace_id: { type: string }
        created_at: { type: integer }
        updated_at: { type: integer }
    Workspace:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        plan:
          type: string
          enum: [starter, pro, enterprise]
        storage_used_bytes: { type: integer }
        bandwidth_used_bytes: { type: integer }
    Pagination:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        pages: { type: integer }
    Error:
      type: object
      properties:
        error: { type: string }

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
                ref: { type: string, description: Referral code }
      responses:
        '201':
          description: User registered
        '409':
          description: Email already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { type: object }
                  workspaces: { type: array, items: { $ref: '#/components/schemas/Workspace' } }
                  accessToken: { type: string }
                  refreshToken: { type: string }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user + workspaces
      responses:
        '200':
          description: Current user info with referral_code
    delete:
      tags: [Auth, GDPR]
      summary: Delete account permanently (GDPR) — requires password confirmation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
      responses:
        '200':
          description: Account deleted
        '401':
          description: Incorrect password

  /auth/me/export:
    get:
      tags: [Auth, GDPR]
      summary: Export all user data as JSON (GDPR) — rate limited 1/24h
      responses:
        '200':
          description: JSON file download with profile, workspaces, videos and transcriptions

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New token pair

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh token)
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Logged out

  /api/health:
    get:
      tags: [System]
      summary: API health check — database, redis, s3
      security: []
      responses:
        '200':
          description: Health status JSON

  /api/videos:
    get:
      tags: [Videos]
      summary: List videos (paginated)
      parameters:
        - $ref: '#/components/parameters/workspaceId'
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Paginated video list
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items: { $ref: '#/components/schemas/Video' }
                  pagination: { $ref: '#/components/schemas/Pagination' }

  /api/videos/{id}:
    get:
      tags: [Videos]
      summary: Get video by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Video object with embedConfig (watermark, colors, etc.)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Video' }
        '404':
          description: Not found
    patch:
      tags: [Videos]
      summary: Update video metadata, folder, visibility or schedule publishing
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                visibility: { type: string, enum: [public, private, password] }
                access_password: { type: string }
                folder_id: { type: string, nullable: true }
                publish_at:
                  type: integer
                  description: Unix timestamp — sets status=scheduled if in the future
      responses:
        '200':
          description: Updated
    delete:
      tags: [Videos]
      summary: Delete video + files
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted

  /api/videos/{id}/token:
    get:
      tags: [Videos]
      summary: Get 15-min signed HLS playback token
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Signed token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  ttl: { type: integer }
                  renewAfter: { type: integer }

  /api/videos/{id}/retry:
    post:
      tags: [Videos]
      summary: Retry failed transcoding job (F0.8)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Job requeued
        '409':
          description: Video not in error state or original file missing

  /api/videos/{id}/download-link:
    post:
      tags: [Videos]
      summary: Generate temporary signed download URL (Pro+ only, 10 min TTL)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Signed download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }
                  ttl: { type: integer }
                  expiresAt: { type: integer }
        '403':
          description: Pro plan required

  /api/videos/bulk:
    post:
      tags: [Videos]
      summary: Bulk operations — delete, move to folder, or change visibility
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, action]
              properties:
                ids:
                  type: array
                  maxItems: 200
                  items: { type: string }
                action:
                  type: string
                  enum: [delete, move, visibility]
                folderId: { type: string, nullable: true }
                visibility: { type: string, enum: [public, private, password] }
      responses:
        '200':
          description: Operation completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  affected: { type: integer }

  /api/upload:
    post:
      tags: [Upload]
      summary: Upload video file — triggers HLS transcoding
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [video, title]
              properties:
                video: { type: string, format: binary }
                title: { type: string }
                description: { type: string }
      responses:
        '200':
          description: Upload accepted, transcoding queued

  /api/workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces the current user belongs to
      responses:
        '200':
          description: Workspace list with settings
    post:
      tags: [Workspaces]
      summary: Create a new workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201':
          description: Workspace created

  /api/workspaces/{workspaceId}:
    get:
      tags: [Workspaces]
      summary: Get workspace details including usage stats and members
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Workspace object
    patch:
      tags: [Workspaces]
      summary: Update workspace settings, name, watermark or custom embed domain
      parameters:
        - in: path
          name: workspaceId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                settings:
                  type: object
                  description: Merged into existing settings JSON
                  properties:
                    embedColor: { type: string }
                    embedLogo: { type: string }
                    embedPlayerName: { type: string }
                    embedAllowedDomains: { type: array, items: { type: string } }
                    watermarkEnabled: { type: boolean }
                    watermarkText: { type: string }
                    watermarkPosition:
                      type: string
                      enum: [top-left, top-right, bottom-left, bottom-right, center]
                    watermarkOpacity: { type: number, minimum: 0.1, maximum: 0.9 }
                custom_embed_domain:
                  type: string
                  description: Enterprise only — CNAME target for white-label embeds
      responses:
        '200':
          description: Updated

  /api/folders:
    get:
      tags: [Folders]
      summary: List all folders in workspace
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Folder list
    post:
      tags: [Folders]
      summary: Create folder
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                parent_id: { type: string, nullable: true }
      responses:
        '201':
          description: Folder created

  /api/folders/{id}:
    patch:
      tags: [Folders]
      summary: Rename folder
      parameters:
        - $ref: '#/components/parameters/workspaceId'
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200':
          description: Renamed
    delete:
      tags: [Folders]
      summary: Delete folder (videos become unfoldered)
      parameters:
        - $ref: '#/components/parameters/workspaceId'
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted

  /api/playlists:
    get:
      tags: [Playlists]
      summary: List playlists in workspace
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Playlist list with video counts
    post:
      tags: [Playlists]
      summary: Create playlist
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                visibility: { type: string, enum: [public, private] }
      responses:
        '201':
          description: Playlist created

  /api/playlists/{id}/videos:
    get:
      tags: [Playlists]
      summary: Get videos in playlist (ordered by position)
      parameters:
        - $ref: '#/components/parameters/workspaceId'
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Video list with position field
    post:
      tags: [Playlists]
      summary: Add video to playlist
      parameters:
        - $ref: '#/components/parameters/workspaceId'
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [video_id]
              properties:
                video_id: { type: string }
      responses:
        '201':
          description: Video added
        '409':
          description: Video already in playlist

  /api/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhooks in workspace
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Webhook list (secret not returned)
    post:
      tags: [Webhooks]
      summary: Create webhook with HMAC-SHA256 signing
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                events:
                  type: array
                  items:
                    type: string
                    enum: [video.ready, video.failed, transcription.complete, video.deleted, '*']
                  default: ['*']
                secret: { type: string, description: Auto-generated if not provided }
      responses:
        '201':
          description: Webhook created (secret shown once)

  /api/webhooks/{id}/deliveries:
    get:
      tags: [Webhooks]
      summary: Last 50 delivery attempts for this webhook
      parameters:
        - $ref: '#/components/parameters/workspaceId'
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Delivery log with status codes

  /api/videos/{videoId}/transcriptions:
    get:
      tags: [Transcriptions]
      summary: List transcriptions for a video
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Transcription list with status
    post:
      tags: [Transcriptions]
      summary: Start Whisper transcription (Pro+ plan required)
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                language:
                  type: string
                  enum: [es, en, fr, de, it, pt, ja, zh, ko, ar, ru]
                  default: en
      responses:
        '202':
          description: Transcription job queued
        '403':
          description: Pro plan upgrade required

  /api/videos/{videoId}/transcriptions/{lang}/subtitles.vtt:
    get:
      tags: [Transcriptions]
      summary: Download subtitles as WebVTT
      security: []
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
        - in: path
          name: lang
          required: true
          schema: { type: string }
      responses:
        '200':
          description: WebVTT subtitle file
          content:
            text/vtt:
              schema: { type: string }

  /api/videos/{videoId}/analytics:
    get:
      tags: [Analytics]
      summary: Get retention, engagement and geographic analytics for a video
      parameters:
        - in: path
          name: videoId
          required: true
          schema: { type: string }
        - in: query
          name: days
          schema: { type: integer, description: Filter to last N days (empty = all time) }
      responses:
        '200':
          description: Analytics data including retention curve, heatmap, device breakdown and geo

  /api/apikeys:
    get:
      tags: [API Keys]
      summary: List API keys for workspace (Pro+)
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      responses:
        '200':
          description: Key list (no secrets shown)
    post:
      tags: [API Keys]
      summary: Create API key — returned only once (Pro+)
      parameters:
        - $ref: '#/components/parameters/workspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201':
          description: Key created — save the full key, it will not be shown again
        '403':
          description: Pro plan required

  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Platform-wide stats (super admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stats including queue status

  /api/admin/audit-log:
    get:
      tags: [Admin]
      summary: Paginated audit log of admin actions (super admin only)
      parameters:
        - in: query
          name: actor
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Paginated audit log entries

  /status:
    get:
      tags: [System]
      summary: Public status page — API, worker, database health
      security: []
      responses:
        '200':
          description: HTML status page

  /api/docs:
    get:
      tags: [System]
      summary: Swagger UI interactive API documentation
      security: []
      responses:
        '200':
          description: Swagger UI HTML

  /api/spec.yaml:
    get:
      tags: [System]
      summary: This OpenAPI 3.0 specification (YAML)
      security: []
      responses:
        '200':
          description: OpenAPI YAML
