# ─── Docker Compose (desarrollo local) ───────────────────────────────────────
# Uso:
#   docker-compose up --build        # Primera vez — construye imágenes
#   docker-compose up                # Arranque rápido (sin rebuild)
#   docker-compose down -v           # Detener y borrar volúmenes (reset total)
#
# Dashboard: http://localhost:3000/dashboard
# Status:    http://localhost:3000/status
# API Docs:  http://localhost:3000/api/docs
# Admin:     http://localhost:3000/admin
#
# Demo user: demo@streamvault.local / demo12345
# ─────────────────────────────────────────────────────────────────────────────

# Variables compartidas por API + Worker
x-app-env: &app-env
  PORT: "3000"
  NODE_ENV: development
  APP_URL: ${APP_URL:-http://localhost:3000}

  DATABASE_URL: postgres://streamvault:streamvault@postgres:5432/streamvault
  DATABASE_SSL: "false"
  REDIS_URL: redis://redis:6379

  # Secrets — NUNCA hardcodear en producción.
  # Usar: docker-compose --env-file .env up
  # O definir en el entorno del sistema antes de ejecutar docker-compose.
  # Para desarrollo local se usan valores de desarrollo que NO deben usarse en producción.
  JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-64chars-xxxxxxxxxxx}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production-64chars-xxxxxxx}
  # [CRIT-01] ADMIN_API_KEY débil eliminada del hardcode — debe venir del .env
  # Genera una segura con: node -e "console.log('sv_admin_'+require('crypto').randomBytes(32).toString('hex'))"
  ADMIN_API_KEY: ${ADMIN_API_KEY:-}

  # Super admin — cualquier email que registres primero
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@streamvault.local}

  # CORS — vacío = permite todo en dev
  ALLOWED_ORIGINS: ""

  # Worker — concurrencia POR INSTANCIA (ajustar según CPUs del servidor)
  # Para SaaS escalar horizontalmente: docker compose up --scale worker=N
  # Cada worker toma hasta WORKER_CONCURRENCY jobs de Redis en paralelo.
  # Regla: WORKER_CONCURRENCY = nCPUs del servidor (1-2 por core)
  # Ej: servidor 8 cores → 3 workers × concurrency=3 = 9 jobs paralelos
  WORKER_CONCURRENCY: "3"
  TRANSCRIPTION_CONCURRENCY: "4"

  # S3 — deshabilitado por defecto en dev (usa almacenamiento local)
  AWS_REGION: ${AWS_REGION:-}
  S3_BUCKET: ${S3_BUCKET:-}
  S3_KEY_PREFIX: ${S3_KEY_PREFIX:-streamvault}
  CLOUDFRONT_BASE_URL: ${CLOUDFRONT_BASE_URL:-}
  DELETE_LOCAL_AFTER_S3: "0"

  # Email — vacío = logs a consola en dev
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-noreply@streamvault.local}

  # Stripe — vacío = deshabilitado en dev
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
  STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
  STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}

  # OpenAI Whisper — ahora se configura por workspace (Dashboard → Ajustes → General)
  # Esta variable global ya no se usa, pero se mantiene para compatibilidad
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  # Bedrock — vacío = AI deshabilitado
  BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-claude-haiku-4-5-20251001}

  # Seguridad de tokens HLS
  REQUIRE_VIDEO_TOKENS: "false"

  # Semilla demo automática en dev
  SEED_DEMO_USER: "1"

  # DB retry config
  DB_CONNECT_RETRIES: "10"
  DB_CONNECT_DELAY_MS: "3000"

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: streamvault
      POSTGRES_PASSWORD: streamvault
      POSTGRES_DB: streamvault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # [HIGH-15] Puerto expuesto solo en localhost para desarrollo.
    # En producción, NO exponer este puerto — acceder solo via red interna de Docker.
    # Para conectarse desde el host en dev: psql -h 127.0.0.1 -p 5432 -U streamvault
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamvault -d streamvault"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    # [HIGH-15] Puerto expuesto solo en localhost para desarrollo.
    # En producción, NO exponer este puerto — acceder solo via red interna de Docker.
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  # ── API Server ────────────────────────────────────────────────
  streamvault:
    build:
      context: .
      dockerfile: Dockerfile
    image: streamvault:local
    container_name: streamvault_api
    ports:
      - "3000:3000"
    volumes:
      # Monta código fuente para edición sin rebuild (excepto node_modules)
      - ./:/app
      - /app/node_modules
      # Datos persistentes compartidos con worker
      - sv_videos:/app/videos
      - sv_uploads:/app/uploads
      - sv_logs:/app/logs
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/ || exit 1"]
      interval: 10s
      timeout: 12s
      retries: 8
      start_period: 30s

  # ── Worker (FFmpeg + Whisper) ─────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: streamvault:local
    container_name: streamvault_worker
    command: node worker.js
    # Override the Dockerfile HEALTHCHECK (which pings port 3000) because the
    # worker process doesn't start an HTTP server — it only consumes Bull queues.
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./:/app
      - /app/node_modules
      - sv_videos:/app/videos
      - sv_uploads:/app/uploads
      - sv_logs:/app/logs
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      streamvault:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    name: streamvault_postgres
  redis_data:
    name: streamvault_redis
  sv_videos:
    name: streamvault_videos
  sv_uploads:
    name: streamvault_uploads
  sv_logs:
    name: streamvault_logs
