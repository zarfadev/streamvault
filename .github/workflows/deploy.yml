name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite disparar manualmente desde GitHub UI

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/streamvault

jobs:
  # ── 1. Build & push imagen Docker ─────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production          # usa la stage 'production' del Dockerfile multi-stage
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          # Cache de capas entre builds para acelerar (usa GitHub Actions cache)
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 2. Deploy al servidor de producción ──────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment: production          # requiere aprobación manual si lo configuras en GitHub

    steps:
      - name: Checkout (para tener docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          source:   docker-compose.prod.yml
          target:   ~/streamvault/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/streamvault

            # Actualizar tag de imagen
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}

            # Pull nueva imagen
            docker pull ${{ env.IMAGE_NAME }}:${IMAGE_TAG}

            # Reiniciar API sin downtime (rolling update — una instancia a la vez)
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale api=2 api
            sleep 10
            docker compose -f docker-compose.prod.yml up -d --no-deps api

            # Reiniciar workers (pueden processar el job actual antes de morir)
            docker compose -f docker-compose.prod.yml up -d --no-deps worker

            # Eliminar imágenes antiguas (ahorra disco)
            docker image prune -f

            echo "✅ Deploy completado — IMAGE_TAG=${IMAGE_TAG}"

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS REQUERIDOS (GitHub → Settings → Secrets → Actions):
#
#   DOCKER_USERNAME  — usuario de Docker Hub
#   DOCKER_PASSWORD  — access token de Docker Hub (no la contraseña)
#   SSH_HOST         — IP o dominio del servidor de producción
#   SSH_USER         — usuario SSH (ej: ubuntu, deploy)
#   SSH_KEY          — clave privada SSH (contenido completo del archivo .pem)
#
# OPCIONAL — para aprobar deploys manualmente:
#   Crear environment "production" en GitHub → Settings → Environments
#   y activar "Required reviewers"
# ─────────────────────────────────────────────────────────────────────────────
