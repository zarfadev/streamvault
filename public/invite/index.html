<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación a workspace</title>
<link rel="stylesheet" href="/css/sv-theme.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.bg-glow {
  position: fixed; pointer-events: none;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(124,108,250,0.12) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 20px; width: 100%; max-width: 440px; padding: 40px;
  position: relative; z-index: 1;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  text-align: center;
}
.logo-text {
  font-family: var(--mono); font-size: 22px; font-weight: 700;
  color: var(--accent2); letter-spacing: -0.5px; display: block; margin-bottom: 20px;
  text-decoration: none;
}
.logo-text span { color: var(--muted); font-weight: 400; }
.invite-icon {
  width: 72px; height: 72px; border-radius: 18px;
  background: rgba(124,108,250,0.12); border: 1px solid rgba(124,108,250,0.2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px; font-size: 32px;
}
.card-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.card-desc { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
.ws-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(34,211,165,0.1); border: 1px solid rgba(34,211,165,0.2);
  color: var(--green); border-radius: 99px; padding: 4px 14px; font-size: 13px;
  font-weight: 600; margin-bottom: 28px;
}
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 8px 16px; border-radius: 10px; font-size: 13px;
  font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
  font-family: var(--sans); text-decoration: none; margin-bottom: 10px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white;
  box-shadow: 0 4px 20px rgba(124,108,250,0.3);
}
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-ghost {
  background: var(--surface2); border: 1px solid var(--border2); color: var(--muted);
}
.btn-ghost:hover { color: var(--text); }
.alert {
  padding: 12px 14px; border-radius: 8px; font-size: 13px;
  margin-bottom: 16px; display: none; align-items: center; gap: 8px;
}
.alert.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: var(--red); display: flex; }
.alert.success { background: rgba(34,211,165,0.1); border: 1px solid rgba(34,211,165,0.2); color: var(--green); display: flex; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.7s linear infinite; display: none;
}
.spinner.show { display: block; }
@media (max-width: 500px) {
  body { align-items: flex-start; padding: 24px 12px 40px; overflow-y: auto; }
  .card { padding: 28px 20px; border-radius: 16px; }
  .btn { padding: 14px; min-height: 48px; font-size: 15px; }
}
@media (max-width: 360px) {
  .card { padding: 24px 16px; }
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="card" id="card-main">
  <a href="/" class="logo-text">Stream<span>Vault</span></a>
  <div class="invite-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--accent2)"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>

  <div class="alert" id="alert-msg"></div>

  <div id="invite-content">
    <div class="card-title" id="invite-title">Cargando invitación…</div>
    <p class="card-desc" id="invite-desc"></p>
    <div id="actions" style="display:none;">
      <button class="btn btn-primary" id="btn-accept" onclick="acceptInvite()">
        <div class="spinner" id="spin-accept"></div>
        <span id="btn-text">Unirme al workspace</span>
      </button>
      <a href="/dashboard" class="btn btn-ghost">Cancelar</a>
    </div>
    <div id="login-prompt" style="display:none;">
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">Necesitas iniciar sesión para aceptar esta invitación.</p>
      <a id="login-link" href="/login" class="btn btn-primary">Iniciar sesión</a>
    </div>
  </div>

  <!-- Success state -->
  <div id="success-content" style="display:none;">
    <div style="margin-bottom:16px;display:flex;justify-content:center;"><div style="width:72px;height:72px;border-radius:18px;background:rgba(34,211,165,0.12);border:1px solid rgba(34,211,165,0.2);display:flex;align-items:center;justify-content:center;"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.8"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="card-title">¡Bienvenido!</div>
    <p class="card-desc" id="success-desc">Ya eres miembro del workspace.</p>
    <a href="/dashboard" class="btn btn-primary">Ir al Dashboard</a>
  </div>
</div>

<script>
const token    = window.location.pathname.split('/').filter(Boolean).pop();
const authToken = localStorage.getItem('sv_access_token') || localStorage.getItem('sv_token') || '';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alert-msg');
  el.textContent = msg;
  el.className = `alert ${type}`;
}

async function init() {
  // Load invite info first
  try {
    const r = await fetch(`/api/invitations/${token}`);
    if (!r.ok) {
      document.getElementById('invite-title').textContent = 'Invitación inválida';
      document.getElementById('invite-desc').textContent = 'Este enlace es inválido o ha expirado.';
      return;
    }
    const info = await r.json();
    const by = info.inviter_name ? ` por <strong>${esc(info.inviter_name)}</strong>` : '';
    document.getElementById('invite-title').textContent = `Únete a "${info.workspace_name}"`;
    document.getElementById('invite-desc').innerHTML =
      `Has sido invitado${by} al workspace <strong>"${esc(info.workspace_name)}"</strong> como <strong>${esc(info.role)}</strong>.`;
    document.getElementById('invite-title').dataset.workspaceName = info.workspace_name;
  } catch {
    document.getElementById('invite-title').textContent = 'Error cargando invitación';
    return;
  }

  // Show login prompt if not authenticated
  if (!authToken) {
    const redirectUrl = encodeURIComponent(window.location.pathname);
    document.getElementById('login-link').href = `/login?redirect=${redirectUrl}`;
    document.getElementById('login-prompt').style.display = 'block';
    return;
  }

  document.getElementById('actions').style.display = 'block';
}

async function acceptInvite() {
  const btn  = document.getElementById('btn-accept');
  const spin = document.getElementById('spin-accept');
  const txt  = document.getElementById('btn-text');
  btn.disabled = true; spin.classList.add('show'); txt.textContent = 'Procesando…';

  try {
    const r = await fetch(`/api/invitations/${token}/accept`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`,
      },
    });
    const data = await r.json();

    if (!r.ok) {
      showAlert(data.error || 'Error al aceptar la invitación.');
      return;
    }

    // Update stored workspace list
    if (data.workspace) {
      const stored = JSON.parse(localStorage.getItem('sv_workspace') || 'null');
      if (!stored) localStorage.setItem('sv_workspace', JSON.stringify(data.workspace));
    }

    document.getElementById('invite-content').style.display = 'none';
    document.getElementById('success-content').style.display = 'block';
    const wsName = data.workspace?.name || document.getElementById('invite-title').dataset.workspaceName || 'el workspace';
    document.getElementById('success-desc').textContent = `Ya eres miembro de "${wsName}".`;

  } catch {
    showAlert('Error de conexión. Intenta nuevamente.');
  } finally {
    btn.disabled = false; spin.classList.remove('show'); txt.textContent = 'Unirme al workspace';
  }
}

init();
</script>
<script src="/js/cookie-banner.js"></script>
</body>
</html>
