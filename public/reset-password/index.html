<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña</title>
<link rel="stylesheet" href="/css/sv-theme.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.bg-glow {
  position: fixed; pointer-events: none;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(124,108,250,0.12) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 20px; width: 100%; max-width: 420px; padding: 40px;
  position: relative; z-index: 1;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}
.card-logo { text-align: center; margin-bottom: 28px; }
.logo-text {
  font-family: var(--mono); font-size: 22px; font-weight: 700;
  color: var(--accent2); letter-spacing: -0.5px; display: block; margin-bottom: 4px;
  text-decoration: none;
}
.logo-text span { color: var(--muted); font-weight: 400; }
.logo-sub { font-size: 13px; color: var(--muted); }
.card-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.card-desc { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.form-group input {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px;
  color: var(--text); padding: 12px 14px; font-size: 14px; font-family: var(--sans);
  outline: none; transition: all 0.2s; width: 100%;
}
.form-group input:focus { border-color: var(--accent); background: rgba(124,108,250,0.05); }
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 8px 16px; border-radius: 10px; font-size: 13px;
  font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
  font-family: var(--sans); text-decoration: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white;
  box-shadow: 0 4px 20px rgba(124,108,250,0.3);
}
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(124,108,250,0.45); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.alert {
  padding: 12px 14px; border-radius: 8px; font-size: 13px;
  margin-bottom: 16px; display: none; align-items: center; gap: 8px;
}
.alert.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: var(--red); display: flex; }
.alert.success { background: rgba(34,211,165,0.1); border: 1px solid rgba(34,211,165,0.2); color: var(--green); display: flex; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.7s linear infinite; display: none;
}
.spinner.show { display: block; }
.back-link {
  position: fixed; top: 24px; left: 24px;
  display: flex; align-items: center; gap: 6px;
  color: var(--muted); text-decoration: none; font-size: 13px;
  transition: color 0.2s; z-index: 10;
}
.back-link:hover { color: var(--text); }
.back-link {
  top: calc(16px + env(safe-area-inset-top, 0px));
  left: calc(16px + env(safe-area-inset-left, 0px));
}
@media (max-width: 500px) {
  body { align-items: flex-start; padding: 64px 12px 40px; overflow-y: auto; }
  .card { padding: 28px 20px; border-radius: 16px; }
  .form-group input { padding: 13px 14px; font-size: 15px; min-height: 48px; }
  .btn { padding: 14px; min-height: 48px; font-size: 15px; }
}
@media (max-width: 360px) {
  .card { padding: 24px 16px; }
}
</style>
</head>
<body>

<a href="/login" class="back-link">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  Iniciar sesión
</a>

<div class="bg-glow"></div>

<div class="card" id="card-form">
  <div class="card-logo">
    <a href="/" class="logo-text">Stream<span>Vault</span></a>
    <span class="logo-sub">Plataforma de Video Streaming</span>
  </div>
  <div class="card-title">Nueva contraseña</div>
  <p class="card-desc">Crea una nueva contraseña segura para tu cuenta.</p>

  <div class="alert" id="alert-msg"></div>

  <div id="form-wrap">
    <div class="form-group">
      <label for="pass1">Nueva contraseña</label>
      <input type="password" id="pass1" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label for="pass2">Confirmar contraseña</label>
      <input type="password" id="pass2" placeholder="Repite la contraseña" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn btn-primary" id="btn-reset" onclick="doReset()">
      <div class="spinner" id="spin-reset"></div>
      <span id="btn-text">Guardar contraseña</span>
    </button>
  </div>
</div>

<!-- Success state -->
<div class="card" id="card-success" style="display:none; text-align:center;">
  <div style="font-size:48px; margin-bottom:16px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><polyline points="20 6 9 17 4 12"/></svg></div>
  <div class="card-title" style="text-align:center;">Contraseña actualizada</div>
  <p class="card-desc" style="text-align:center;">Tu contraseña fue cambiada exitosamente. Ya puedes iniciar sesión.</p>
  <a href="/login" class="btn btn-primary">Ir al inicio de sesión</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

if (!token) {
  showAlert('Enlace inválido. Por favor solicita un nuevo enlace de restablecimiento.', 'error');
  document.getElementById('form-wrap').style.display = 'none';
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alert-msg');
  el.textContent = msg;
  el.className = `alert ${type}`;
}

async function doReset() {
  const pass1 = document.getElementById('pass1').value;
  const pass2 = document.getElementById('pass2').value;

  if (!pass1 || !pass2) return showAlert('Por favor completa ambos campos.');
  if (pass1.length < 8) return showAlert('La contraseña debe tener al menos 8 caracteres.');
  if (pass1 !== pass2) return showAlert('Las contraseñas no coinciden.');

  const btn  = document.getElementById('btn-reset');
  const spin = document.getElementById('spin-reset');
  const txt  = document.getElementById('btn-text');
  btn.disabled = true; spin.classList.add('show'); txt.textContent = 'Guardando…';

  try {
    const r = await fetch('/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass1 }),
    });
    const data = await r.json();
    if (!r.ok) {
      showAlert(data.error || 'Error al restablecer la contraseña.');
    } else {
      document.getElementById('card-form').style.display = 'none';
      document.getElementById('card-success').style.display = 'block';
    }
  } catch {
    showAlert('Error de conexión. Intenta nuevamente.');
  } finally {
    btn.disabled = false; spin.classList.remove('show'); txt.textContent = 'Guardar contraseña';
  }
}
</script>
<script src="/js/cookie-banner.js"></script>
</body>
</html>
